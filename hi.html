<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Links</title>
  <style>
    :root {
      --bg: #0b1017;
      --overlay: rgba(2, 6, 12, 0.72);
      --card: rgba(34, 39, 47, 0.96);
      --card-2: rgba(28, 33, 40, 0.98);
      --text: #f5f7fb;
      --muted: #c4cad4;
      --divider: rgba(255,255,255,0.10);
      --icon-bg: #0c1118;
      --shadow: 0 24px 60px rgba(0,0,0,0.45);
      --radius: 24px;
      --sheet-width: min(560px, calc(100vw - 28px));
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      overflow: hidden;
      position: relative;
    }

    .app {
      min-height: 100vh;
      position: relative;
      background:
        radial-gradient(circle at 20% 20%, rgba(64, 84, 115, 0.22), transparent 30%),
        radial-gradient(circle at 80% 10%, rgba(89, 48, 98, 0.18), transparent 28%),
        linear-gradient(180deg, #081019 0%, #0b1017 100%);
    }

    .fake-instagram {
      position: absolute;
      inset: 0;
      overflow: hidden;
      filter: saturate(0.95) blur(0.2px);
      opacity: 0.92;
      pointer-events: none;
    }

    .profile-shell {
      width: min(820px, 100%);
      margin: 0 auto;
      padding: 18px 18px 80px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.1rem;
      padding: 8px 0 18px;
      color: rgba(255,255,255,0.92);
    }

    .profile-head {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 16px;
      align-items: start;
      margin-bottom: 18px;
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, #28384d, #101820);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.03);
    }

    .profile-name {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .stats {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      font-size: 0.95rem;
      color: rgba(255,255,255,0.84);
      margin-bottom: 12px;
    }

    .bio {
      color: rgba(255,255,255,0.88);
      line-height: 1.45;
      font-size: 0.96rem;
      max-width: 520px;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr 48px;
      gap: 10px;
      margin: 20px 0 24px;
    }

    .ghost-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.92);
      height: 40px;
      border-radius: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
    }

    .tile {
      aspect-ratio: 1 / 1;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02)),
        linear-gradient(180deg, #223042, #121a24);
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: var(--overlay);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 24px 14px 22px;
      z-index: 20;
      opacity: 1;
      transition: opacity 220ms ease;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    .overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .sheet {
      width: var(--sheet-width);
      background: linear-gradient(180deg, var(--card) 0%, var(--card-2) 100%);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.06);
      transform: translateY(0);
      opacity: 1;
      transition: transform 260ms cubic-bezier(.2,.8,.2,1), opacity 220ms ease;
    }

    .overlay.hidden .sheet {
      transform: translateY(18px);
      opacity: 0;
    }

    .sheet-header {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 56px;
      border-bottom: 1px solid var(--divider);
      font-weight: 700;
      font-size: 1.02rem;
      letter-spacing: 0.01em;
    }

    .close-btn {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      border: 0;
      background: transparent;
      color: rgba(255,255,255,0.95);
      cursor: pointer;
      border-radius: 999px;
    }

    .close-btn:hover { background: rgba(255,255,255,0.06); }

    .link-list {
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .link-item + .link-item {
      border-top: 1px solid var(--divider);
    }

    .link-card {
      display: grid;
      grid-template-columns: 52px 1fr;
      gap: 14px;
      align-items: center;
      width: 100%;
      text-decoration: none;
      color: inherit;
      padding: 18px 18px;
      transition: background-color 160ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    .link-card:hover,
    .link-card:focus-visible {
      background: rgba(255,255,255,0.04);
      outline: none;
    }

    .icon-wrap {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--icon-bg);
      border: 1px solid rgba(255,255,255,0.08);
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    .link-title {
      font-size: 1rem;
      line-height: 1.2;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 2px;
    }

    .link-subtitle {
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .handle {
      position: fixed;
      top: max(8px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,0.15);
      z-index: 5;
      opacity: 0.7;
    }

    @media (min-width: 760px) {
      .overlay {
        align-items: center;
      }
    }

    @media (max-width: 520px) {
      .sheet-header {
        min-height: 60px;
      }
      .link-card {
        padding: 17px 16px;
      }
      .link-title {
        font-size: 0.98rem;
      }
      .link-subtitle {
        font-size: 0.89rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="fake-instagram" aria-hidden="true">
      <div class="profile-shell">
        <div class="topbar">yourhandle</div>
        <div class="profile-head">
          <div class="avatar"></div>
          <div>
            <div class="profile-name">Your Artist Name</div>
            <div class="stats">
              <span>128 posts</span>
              <span>4,516 followers</span>
              <span>2,079 following</span>
            </div>
            <div class="bio">
              Artist<br />
              Cozy lofi / instrumental music ☀️<br />
              Producer · Guitarist · Playlist curator
            </div>
          </div>
        </div>
        <div class="button-row">
          <button class="ghost-btn" type="button">Following</button>
          <button class="ghost-btn" type="button">Message</button>
          <button class="ghost-btn" type="button">+</button>
        </div>
        <div class="grid">
          <div class="tile"></div><div class="tile"></div><div class="tile"></div>
          <div class="tile"></div><div class="tile"></div><div class="tile"></div>
          <div class="tile"></div><div class="tile"></div><div class="tile"></div>
        </div>
      </div>
    </div>

    <div class="overlay" id="overlay">
      <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
        <div class="sheet-header">
          <button class="close-btn" id="closeBtn" aria-label="Close">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M6 6L18 18M18 6L6 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
          </button>
          <span id="sheetTitle">Links</span>
        </div>
        <ul class="link-list" id="linkList"></ul>
      </div>
    </div>
  </div>

  <script>
    const links = [
      {
        title: 'The Link in bio ✨',
        subtitle: 'ffm.bio/yourname',
        url: 'https://example.com',
        icon: 'link'
      },
      {
        title: 'Cozy Lofi Guitar Playlist',
        subtitle: 'open.spotify.com/playlist/yourplaylist',
        url: 'https://open.spotify.com',
        icon: 'link'
      },
      {
        title: 'Your Facebook Page',
        subtitle: 'Facebook Page',
        url: 'https://facebook.com',
        icon: 'facebook'
      },
      {
        title: 'Submit to playlist 🖤',
        subtitle: 'sbmt.to/yourname',
        url: 'https://example.com/submit',
        icon: 'link'
      }
    ];

    const linkList = document.getElementById('linkList');
    const overlay = document.getElementById('overlay');
    const closeBtn = document.getElementById('closeBtn');

    const icons = {
      link: `
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M10.5 13.5L13.5 10.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <path d="M8.2 15.8L6.9 17.1a3.5 3.5 0 1 1-4.95-4.95l3.2-3.2a3.5 3.5 0 0 1 4.95 0" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M15.8 8.2L17.1 6.9a3.5 3.5 0 1 1 4.95 4.95l-3.2 3.2a3.5 3.5 0 0 1-4.95 0" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>`,
      facebook: `
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="10" fill="white" opacity="0.96"></circle>
          <path d="M13.3 20V12.7H15.7L16.1 9.9H13.3V8.1c0-.8.2-1.3 1.4-1.3H16.2V4.3c-.3 0-1.2-.1-2.3-.1-2.3 0-3.8 1.4-3.8 4v1.7H7.8v2.8H10V20h3.3Z" fill="#121826"></path>
        </svg>`
    };

    function renderLinks() {
      linkList.innerHTML = links.map(link => `
        <li class="link-item">
          <a class="link-card" href="${link.url}" target="_blank" rel="noopener noreferrer">
            <span class="icon-wrap">${icons[link.icon] || icons.link}</span>
            <span>
              <span class="link-title">${link.title}</span>
              <span class="link-subtitle">${link.subtitle}</span>
            </span>
          </a>
        </li>
      `).join('');
    }

    function closeSheet() {
      overlay.classList.add('hidden');
    }

    closeBtn.addEventListener('click', closeSheet);

    overlay.addEventListener('click', (event) => {
      if (event.target === overlay) closeSheet();
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') closeSheet();
    });

    renderLinks();
  </script>
</body>
</html>
