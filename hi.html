<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Links</title>
  <style>
    :root {
      --overlay: rgba(2, 6, 12, 0.82);
      --card: rgba(34, 39, 47, 0.98);
      --card-2: rgba(28, 33, 40, 0.99);
      --text: #f5f7fb;
      --muted: #c4cad4;
      --divider: rgba(255,255,255,0.10);
      --icon-bg: #0c1118;
      --shadow: 0 24px 60px rgba(0,0,0,0.45);
      --radius: 24px;
      --sheet-width: min(560px, calc(100vw - 28px));
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: var(--font);
      background: transparent;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 20%, rgba(64, 84, 115, 0.18), transparent 30%),
        radial-gradient(circle at 80% 10%, rgba(89, 48, 98, 0.14), transparent 28%),
        var(--overlay);
    }

    .overlay {
      min-height: 100vh;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 24px 14px 22px;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    .sheet {
      width: var(--sheet-width);
      background: linear-gradient(180deg, var(--card) 0%, var(--card-2) 100%);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.06);
      transform: translateY(0);
      opacity: 1;
      animation: slideUp 260ms cubic-bezier(.2,.8,.2,1);
    }

    @keyframes slideUp {
      from {
        transform: translateY(18px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .sheet-header {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 56px;
      border-bottom: 1px solid var(--divider);
      font-weight: 700;
      font-size: 1.02rem;
      letter-spacing: 0.01em;
    }

    .close-btn {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      border: 0;
      background: transparent;
      color: rgba(255,255,255,0.95);
      cursor: pointer;
      border-radius: 999px;
    }

    .close-btn:hover {
      background: rgba(255,255,255,0.06);
    }

    .link-list {
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .link-item + .link-item {
      border-top: 1px solid var(--divider);
    }

    .link-card {
      display: grid;
      grid-template-columns: 52px 1fr;
      gap: 14px;
      align-items: center;
      width: 100%;
      text-decoration: none;
      color: inherit;
      padding: 18px 18px;
      transition: background-color 160ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    .link-card:hover,
    .link-card:focus-visible {
      background: rgba(255,255,255,0.04);
      outline: none;
    }

    .icon-wrap {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--icon-bg);
      border: 1px solid rgba(255,255,255,0.08);
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    .link-title {
      display: block;
      font-size: 1rem;
      line-height: 1.2;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 2px;
    }

    .link-subtitle {
      display: block;
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @media (min-width: 760px) {
      .overlay {
        align-items: center;
      }
    }

    @media (max-width: 520px) {
      .sheet-header {
        min-height: 60px;
      }

      .link-card {
        padding: 17px 16px;
      }

      .link-title {
        font-size: 0.98rem;
      }

      .link-subtitle {
        font-size: 0.89rem;
      }
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
      <div class="sheet-header">
        <button class="close-btn" id="closeBtn" aria-label="Close">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M6 6L18 18M18 6L6 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          </svg>
        </button>
        <span id="sheetTitle">Links</span>
      </div>

      <ul class="link-list" id="linkList"></ul>
    </div>
  </div>

  <script>
    const links = [
      {
        title: "Spotify",
        subtitle: "Listen now",
        url: "https://spotify.com",
        icon: "link"
      },
      {
        title: "Instagram",
        subtitle: "@yourhandle",
        url: "https://instagram.com",
        icon: "link"
      },
      {
        title: "YouTube",
        subtitle: "Watch videos",
        url: "https://youtube.com",
        icon: "link"
      },
      {
        title: "Contact",
        subtitle: "your@email.com",
        url: "mailto:your@email.com",
        icon: "mail"
      }
    ];

    const icons = {
      link: `
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M10.5 13.5L13.5 10.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <path d="M8.2 15.8L6.9 17.1a3.5 3.5 0 1 1-4.95-4.95l3.2-3.2a3.5 3.5 0 0 1 4.95 0" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M15.8 8.2L17.1 6.9a3.5 3.5 0 1 1 4.95 4.95l-3.2 3.2a3.5 3.5 0 0 1-4.95 0" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>`,
      mail: `
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M4 7h16v10H4z" stroke="white" stroke-width="2" rx="2"/>
          <path d="M4 8l8 6 8-6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>`
    };

    const linkList = document.getElementById("linkList");
    const closeBtn = document.getElementById("closeBtn");

    function renderLinks() {
      linkList.innerHTML = links.map(link => `
        <li class="link-item">
          <a class="link-card" href="${link.url}" target="_blank" rel="noopener noreferrer">
            <span class="icon-wrap">${icons[link.icon] || icons.link}</span>
            <span>
              <span class="link-title">${link.title}</span>
              <span class="link-subtitle">${link.subtitle}</span>
            </span>
          </a>
        </li>
      `).join("");
    }

    closeBtn.addEventListener("click", () => {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = "about:blank";
      }
    });

    renderLinks();
  </script>
</body>
</html>
